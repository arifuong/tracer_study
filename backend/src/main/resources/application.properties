# Konfigurasi Database
spring.datasource.url=jdbc:mysql://localhost:3306/tracer_study?useSSL=false&serverTimezone=Asia/Jakarta&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Konfigurasi JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Port aplikasi
server.port=8080

# Konfigurasi JWT
jwt.secret=tracer-study-secret-key-yang-sangat-panjang-dan-aman-minimal-256-bit
jwt.expiration=86400000